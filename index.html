<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piano</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f5f5f0;
      display: flex; justify-content: center;
      min-height: 100vh; padding: 2rem 1rem;
      touch-action: manipulation;
    }
    .wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 1.5rem;
      width: 100%;
    }
    h1 { font-size: 24px; font-weight: 600; color: #222; letter-spacing: 0.08em; }
    .note-display {
      font-size: 36px; font-weight: 600; color: #222;
      min-height: 48px; transition: opacity 0.4s;
    }
    .piano-scroll {
      width: 100%; overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 10px;
    }
    .piano-container { position: relative; display: inline-flex; min-width: max-content; }
    .whites { display: flex; gap: 2px; }

    .key-white {
      width: 48px; height: 160px;
      background: #fff;
      border: 1.5px solid #ccc;
      border-radius: 0 0 6px 6px;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 10px; cursor: pointer;
      font-size: 12px; color: #888; font-weight: 600;
      transition: background 0.05s; position: relative; z-index: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .key-white:active, .key-white.pressed { background: #cce4ff; }

    .key-black {
      width: 30px; height: 100px;
      background: #222;
      border-radius: 0 0 4px 4px;
      cursor: pointer; position: absolute; top: 0; z-index: 2;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 6px; font-size: 9px; color: #aaa;
      transition: background 0.05s;
      -webkit-tap-highlight-color: transparent;
    }
    .key-black:active, .key-black.pressed { background: #555; }

    .hint {
      font-size: 13px; color: #888; text-align: center;
      max-width: 400px; line-height: 1.6;
    }

    @media (max-width: 600px) {
      .key-white { width: 38px; height: 130px; font-size: 10px; }
      .key-black { width: 24px; height: 82px; font-size: 8px; }
      .note-display { font-size: 28px; }
      h1 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🎹 Piano</h1>
    <div class="note-display" id="nd">—</div>
    <div class="piano-scroll">
      <div class="piano-container" id="piano"></div>
    </div>
    <div class="hint" id="hint">
      Touch or click keys to play<br>
      Desktop keyboard: <strong>A S D F G H J K L</strong> (white) &nbsp;|&nbsp; <strong>W E T Y U O</strong> (black)
    </div>
  </div>

  <script>
    const AC = window.AudioContext || window.webkitAudioContext;
    const ac = new AC();

    const notes = [
      {n:'C4', f:261.63, t:'w', k:'a'}, {n:'C#4', f:277.18, t:'b', k:'w'},
      {n:'D4', f:293.66, t:'w', k:'s'}, {n:'D#4', f:311.13, t:'b', k:'e'},
      {n:'E4', f:329.63, t:'w', k:'d'},
      {n:'F4', f:349.23, t:'w', k:'f'}, {n:'F#4', f:369.99, t:'b', k:'t'},
      {n:'G4', f:392.00, t:'w', k:'g'}, {n:'G#4', f:415.30, t:'b', k:'y'},
      {n:'A4', f:440.00, t:'w', k:'h'}, {n:'A#4', f:466.16, t:'b', k:'u'},
      {n:'B4', f:493.88, t:'w', k:'j'},
      {n:'C5', f:523.25, t:'w', k:'k'}, {n:'C#5', f:554.37, t:'b', k:'o'},
      {n:'D5', f:587.33, t:'w', k:'l'}, {n:'D#5', f:622.25, t:'b', k:'p'},
      {n:'E5', f:659.25, t:'w', k:';'},
    ];

    function play(freq, label) {
      if (ac.state === 'suspended') ac.resume();
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'triangle';
      o.frequency.setValueAtTime(freq, ac.currentTime);
      g.gain.setValueAtTime(0.4, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 1.3);
      o.start(); o.stop(ac.currentTime + 1.3);
      const nd = document.getElementById('nd');
      nd.textContent = label; nd.style.opacity = 1;
      clearTimeout(nd._t);
      nd._t = setTimeout(() => nd.style.opacity = '0.3', 700);
    }

    const piano = document.getElementById('piano');
    const whites = document.createElement('div');
    whites.className = 'whites';
    piano.appendChild(whites);

    const keyMap = {}, elMap = {};
    let wIdx = 0;
    const blackPos = [];

    notes.forEach((n) => {
      const el = document.createElement('div');
      elMap[n.n] = el;
      keyMap[n.k] = n;

      if (n.t === 'w') {
        el.className = 'key-white';
        el.textContent = n.k.toUpperCase();
        el.addEventListener('mousedown', e => { e.preventDefault(); play(n.f, n.n); el.classList.add('pressed'); });
        el.addEventListener('mouseup', () => el.classList.remove('pressed'));
        el.addEventListener('mouseleave', () => el.classList.remove('pressed'));
        el.addEventListener('touchstart', e => { e.preventDefault(); play(n.f, n.n); el.classList.add('pressed'); }, {passive:false});
        el.addEventListener('touchend', () => el.classList.remove('pressed'));
        whites.appendChild(el);
        wIdx++;
      } else {
        blackPos.push({ note: n, prevWi: wIdx - 1 });
        el.className = 'key-black';
        el.textContent = n.k.toUpperCase();
        el.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); play(n.f, n.n); el.classList.add('pressed'); });
        el.addEventListener('mouseup', () => el.classList.remove('pressed'));
        el.addEventListener('mouseleave', () => el.classList.remove('pressed'));
        el.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); play(n.f, n.n); el.classList.add('pressed'); }, {passive:false});
        el.addEventListener('touchend', () => el.classList.remove('pressed'));
        piano.appendChild(el);
      }
    });

    function positionBlacks() {
      const wKeys = whites.querySelectorAll('.key-white');
      if (!wKeys.length) return;
      const kw = wKeys[0].offsetWidth + 2;
      blackPos.forEach(({note, prevWi}) => {
        const el = elMap[note.n];
        const bw = el.offsetWidth;
        el.style.left = (prevWi * kw + kw - bw / 2) + 'px';
      });
    }

    window.addEventListener('load', positionBlacks);
    window.addEventListener('resize', positionBlacks);
    setTimeout(positionBlacks, 100);

    document.addEventListener('keydown', e => {
      if (e.repeat) return;
      const n = keyMap[e.key.toLowerCase()];
      if (!n) return;
      play(n.f, n.n);
      const el = elMap[n.n];
      if (el) el.classList.add('pressed');
    });
    document.addEventListener('keyup', e => {
      const n = keyMap[e.key.toLowerCase()];
      if (!n) return;
      const el = elMap[n.n];
      if (el) el.classList.remove('pressed');
    });

    if ('ontouchstart' in window) {
      document.getElementById('hint').innerHTML =
        'Touch keys to play<br>Scroll sideways to see more notes';
    }
  </script>
</body>
</html>
